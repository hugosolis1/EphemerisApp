workflows:
  ios-ephemeris:
    name: iOS Ephemeris
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      vars:
        XCODE_PROJECT: "EphemerisApp.xcodeproj"
        XCODE_SCHEME: "EphemerisApp"
        BUNDLE_ID: "com.ephemeris.app"
    scripts:
      - name: Build unsigned IPA for TrollStore
        script: |
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            clean build
      
      - name: Package IPA
        script: |
          mkdir -p Payload
          cp -r "build/Release-iphoneos/$XCODE_SCHEME.app" Payload/
          zip -r "EphemerisApp.ipa" Payload/
    artifacts:
      - "EphemerisApp.ipa"