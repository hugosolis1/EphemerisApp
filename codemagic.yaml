workflows:
  ios-ephemeris:
    name: iOS Ephemeris
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      ios_signing:
        provisioning_profiles: []
        certificates: []
      vars:
        XCODE_PROJECT: "EphemerisApp.xcodeproj"
        XCODE_SCHEME: "EphemerisApp"
        BUNDLE_ID: "com.ephemeris.app"
    scripts:
      - name: Set up code signing settings (skip signing)
        script: |
          xcode-project use-profiles
      - name: Build unsigned IPA
        script: |
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            clean build
      - name: Package IPA
        script: |
          mkdir -p build/ios
          cd build/Release-iphoneos
          mkdir -p Payload
          cp -r EphemerisApp.app Payload/
          zip -r ../../EphemerisApp.ipa Payload
          cd ../..
    artifacts:
      - build/EphemerisApp.ipa
      - build/Release-iphoneos/*.app
